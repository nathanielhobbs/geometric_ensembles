# Dataset config for Flickr30K de→en image captioning

# Preprocessing
PREPROCESSED_DIR="data.tokenized.de-en"
SOURCE_LANG="de"
TARGET_LANG="en"
DATA_BIN="data-bin/wmt17_flickr.tokenized.de-en"
BPE_CODES="data.tokenized.de-en/codes.10000.bpe.de"
TEST_INPUT="data/flickr30k/source.txt"

# Training (architecture used in the paper; adjust if retraining)
CHECKPOINT_DIR="checkpoints/transformer.flickr30k"
OUTPUT_DIR="translations/flickr30k"
ARCH="transformer_iwslt_de_en"
MAX_TOKENS=4096
LR=0.0005
WARMUP=4000
DROPOUT=0.3
ENCODER_LAYERS=6
DECODER_LAYERS=6
