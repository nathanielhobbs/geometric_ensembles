# Dataset config for WMT23 cs→uk (fully worked example used in the paper)

# Preprocessing
PREPROCESSED_DIR="wmt23_cs_uk_russ_tok"
SOURCE_LANG="cs"
TARGET_LANG="uk"
DATA_BIN="data-bin/wmt23.ru-tokenized.cs-uk"
BPE_CODES="wmt23_cs_uk_russ_tok/code"
TEST_INPUT="wmt23_cs_uk_russ_tok/test.cs"

# Training
CHECKPOINT_DIR="checkpoints/transformer.wmt23.cs-uk"
OUTPUT_DIR="translations/transformer_wmt23_cs_uk"
ARCH="transformer_vaswani_wmt_en_de_big"
MAX_TOKENS=4096
LR=0.0001
WARMUP=16000
DROPOUT=0.3
ENCODER_LAYERS=12
DECODER_LAYERS=6
