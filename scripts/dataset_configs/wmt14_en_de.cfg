# Dataset config for WMT14 en→de news translation

# Preprocessing
PREPROCESSED_DIR="data.tokenized.en-de"
SOURCE_LANG="en"
TARGET_LANG="de"
DATA_BIN="data-bin/wmt14.tokenized.en-de"
BPE_CODES="data.tokenized.en-de/code"
TEST_INPUT="data/wmt14_en_de/source.txt"

# Training (fconv architecture used in the paper; adjust if retraining)
CHECKPOINT_DIR="checkpoints/fconv_wmt_en_de"
OUTPUT_DIR="translations/fconv_wmt_en_de"
ARCH="fconv_wmt_en_de"
MAX_TOKENS=4000
LR=0.5
WARMUP=0
DROPOUT=0.2
ENCODER_LAYERS=15
DECODER_LAYERS=15
