# Dataset config for IWSLT14 de→en speech translation

# Preprocessing
PREPROCESSED_DIR="data.tokenized.de-en"
SOURCE_LANG="de"
TARGET_LANG="en"
DATA_BIN="data-bin/iwslt14.tokenized.de-en"
BPE_CODES="data.tokenized.de-en/code"
TEST_INPUT="data/iwslt14/source.txt"

# Training (architecture from fairseq IWSLT14 example; adjust if retraining)
CHECKPOINT_DIR="checkpoints/transformer.iwslt14"
OUTPUT_DIR="translations/iwslt14"
ARCH="transformer_iwslt_de_en"
MAX_TOKENS=4096
LR=0.0005
WARMUP=4000
DROPOUT=0.3
ENCODER_LAYERS=6
DECODER_LAYERS=6
